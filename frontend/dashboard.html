<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空生存預測矩陣</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #040c1a; --panel: rgba(2,12,30,.95); --border: rgba(0,212,255,.22);
            --primary: #00d4ff; --good: #00ff88; --warn: #ffaa00; --danger: #ff3355;
            --label: rgba(0,212,255,.82); --dim: rgba(0,212,255,.45);
            --font: 'Share Tech Mono','Consolas',monospace;
        }
        body { background-color: var(--bg); color: var(--primary); font-family: var(--font); }
        body::after {
            content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9000;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,255,.007) 2px, rgba(0,212,255,.007) 4px);
        }
        .panel {
            background: var(--panel); border: 1px solid var(--border);
            box-shadow: 0 0 20px rgba(0, 212, 255, .04), inset 0 0 30px rgba(0, 212, 255, .01);
        }
        .ptitle {
            font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
            color: var(--label); border-bottom: 1px solid var(--border); padding: 8px 12px; flex-shrink: 0;
            font-weight: bold; background: rgba(0, 212, 255, 0.02);
        }
        .hud-input, .hud-select {
            width: 100%; background: rgba(0,8,22,.88); border: 1px solid var(--border);
            color: var(--primary); font-family: var(--font); font-size: 12px; padding: 6px; outline: none;
        }
        .rbar { height: 6px; background: rgba(0,212,255,.08); border-radius: 3px; overflow: hidden; margin-top: 5px; }
        .rbar-fill { height: 100%; transition: width 0.3s; }
        .btn { width: 100%; border: 1px solid var(--border); padding: 8px; font-size: 12px; cursor: pointer; transition: all 0.2s; letter-spacing: 1px; }
        .btn:hover { background: rgba(0,212,255,.1); box-shadow: 0 0 10px rgba(0,212,255,.2); }
        canvas { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body class="p-4">

    <header class="panel mb-4 h-12 flex items-center justify-between px-4">
        <div class="flex items-center space-x-3">
            <span class="text-sm font-bold tracking-[3px] text-white">📊 SPACE-SURVIVAL PREDICTION</span>
            <span class="text-xs text-gray-500">│</span>
            <span class="text-xs text-[var(--dim)]">PREDICTION ENGINE RUNNING ON 127.0.0.1:5002 (ISOLATED)</span>
        </div>
        <div id="sim-status" class="text-xs text-gray-500 font-bold border border-gray-600 px-2 py-1">■ STANDBY</div>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-4 gap-4 h-[calc(100vh-100px)]">
        
        <div class="panel flex flex-col">
            <div class="ptitle">⚙ 任務條件與 AI 矩陣</div>
            <div class="p-4 space-y-4 flex-1">
                <div>
                    <label class="block text-[10px] text-[var(--label)] mb-1">乘員人數 (CREW)</label>
                    <input type="number" id="p-crew" class="hud-input" value="4">
                </div>
                <div>
                    <label class="block text-[10px] text-[var(--label)] mb-1">推演速度 (SPEED MULTIPLIER)</label>
                    <input type="number" id="p-speed" class="hud-input" value="10" min="1" max="20">
                </div>
                <div>
                    <label class="block text-[10px] text-[var(--label)] mb-1">AI 管控策略 (AI PROTOCOL)</label>
                    <select id="p-ai" class="hud-select">
                        <option value="Normal">NORMAL (標準運行)</option>
                        <option value="Dynamic AI">DYNAMIC AI (自適應平衡)</option>
                        <option value="Emergency Survival">EMERGENCY (緊急生存-水氧優先)</option>
                        <option value="Energy Conservative">ENERGY SAVE (極限節能)</option>
                    </select>
                </div>
                <div class="pt-6 space-y-3">
                    <button class="btn text-[var(--good)] border-[var(--good)]" onclick="startSim()">▶ 啟動推演矩陣</button>
                    <button class="btn text-[var(--warn)] border-[var(--warn)]" onclick="pauseSim()">⏸ 暫停 / 繼續</button>
                    <button class="btn text-[var(--danger)] border-[var(--danger)]" onclick="resetSim()">■ 中止重置</button>
                    <!-- 方案C：统一风格的同步按钮 -->
                     <button class="btn text-[var(--danger)] border-[var(--danger)]" onclick="resetSim()">■ 中止重置</button>
                    
                    <div style="border-top: 1px solid var(--border); padding-top: 10px; margin-top: 5px;">
                        <button id="btn-sync-snapshot" class="btn text-[#ff8800] border-[#ff8800]" style="box-shadow: inset 0 0 10px rgba(255,136,0,0.15);" onclick="syncFromMaster()">
                            📥 從主引擎(5000)同步殘局
                        </button>
                        <div id="sync-status-text" class="text-[10px] font-mono tracking-widest text-center mt-2 h-4"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="panel flex flex-col lg:col-span-1">
            <div class="ptitle">◈ 即時生存評估</div>
            <div class="p-4 flex flex-col flex-1">
                <div class="text-center py-6 border-b border-gray-800">
                    <p class="text-xs text-[var(--dim)] mb-2 tracking-widest">極限生存預測天數</p>
                    <p id="ui-surv" class="text-6xl font-bold text-[var(--good)]" style="text-shadow: 0 0 20px var(--good);">---</p>
                    <p class="text-xs text-gray-400 mt-2">DAY <span id="ui-day" class="text-white">0</span> | HR <span id="ui-hr" class="text-white">00</span></p>
                </div>
                <div class="mt-4 space-y-4">
                    <div>
                        <div class="flex justify-between text-[11px]"><span class="text-[#00aaff]">O₂ OXYGEN</span><span id="txt-o2">--%</span></div>
                        <div class="rbar"><div id="bar-o2" class="rbar-fill bg-[#00aaff]" style="width:0%"></div></div>
                    </div>
                    <div>
                        <div class="flex justify-between text-[11px]"><span class="text-[#00ff88]">◈ FOOD</span><span id="txt-food">--%</span></div>
                        <div class="rbar"><div id="bar-food" class="rbar-fill bg-[#00ff88]" style="width:0%"></div></div>
                    </div>
                    <div>
                        <div class="flex justify-between text-[11px]"><span class="text-[#00ffcc]">💧 WATER</span><span id="txt-water">--%</span></div>
                        <div class="rbar"><div id="bar-water" class="rbar-fill bg-[#00ffcc]" style="width:0%"></div></div>
                    </div>
                    <div>
                        <div class="flex justify-between text-[11px]"><span class="text-[#ffcc00]">⚡ ENERGY</span><span id="txt-energy">--%</span></div>
                        <div class="rbar"><div id="bar-energy" class="rbar-fill bg-[#ffcc00]" style="width:0%"></div></div>
                    </div>
                    <div>
                        <div class="flex justify-between text-[11px]"><span class="text-[#ff3355]">♥ HEALTH</span><span id="txt-health">--%</span></div>
                        <div class="rbar"><div id="bar-health" class="rbar-fill bg-[#ff3355]" style="width:0%"></div></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="panel flex flex-col lg:col-span-2">
            <div class="ptitle">◈ 資源衰減趨勢分析 (TELEMETRY CHART)</div>
            <div class="p-4 flex-1 relative min-h-[300px]">
                <canvas id="simChart"></canvas>
            </div>
        </div>

    </main>

    <script>
    // 【統一數據大腦】：強制連線至 Simulation System 的核心
    // 🔴 修复：【獨立預測大腦】：強制連線至 5002 影子預測引擎
    const API = (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' || window.location.protocol === 'file:') 
        ? 'http://127.0.0.1:5002/api/dash' 
        : '/api/dash';
        let pollTimer = null;
        let simChart;

        // 初始化圖表
        function initChart() {
            const ctx = document.getElementById('simChart').getContext('2d');
            simChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        { label: 'O₂', borderColor: '#00aaff', borderWidth: 2, pointRadius: 0, tension: 0.4, data: [] },
                        { label: 'FOOD', borderColor: '#00ff88', borderWidth: 2, pointRadius: 0, tension: 0.4, data: [] },
                        { label: 'WATER', borderColor: '#00ffcc', borderWidth: 2, pointRadius: 0, tension: 0.4, data: [] },
                        { label: 'ENERGY', borderColor: '#ffcc00', borderWidth: 2, pointRadius: 0, tension: 0.4, data: [] }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false,
                    scales: {
                        x: { ticks: { color: 'rgba(0,212,255,.5)' }, grid: { color: 'rgba(0,212,255,.1)' } },
                        y: { min: 0, max: 100, ticks: { color: 'rgba(0,212,255,.5)' }, grid: { color: 'rgba(0,212,255,.1)' } }
                    },
                    plugins: { legend: { labels: { color: 'rgba(0,212,255,.8)', font: { family: 'Share Tech Mono' } } } }
                }
            });
        }

        async function startSim() {
            const payload = {
                crewCount: document.getElementById('p-crew').value,
                speed: document.getElementById('p-speed').value,
                aiMode: document.getElementById('p-ai').value
            };
            try {
                await fetch(`${API}/start`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                document.getElementById('sim-status').innerText = "▶ SIM RUNNING";
                document.getElementById('sim-status').className = "text-xs font-bold px-2 py-1 text-[var(--good)] border border-[var(--good)] shadow-[0_0_10px_var(--good)]";
                if(!pollTimer) pollTimer = setInterval(pollData, 1000);
            } catch(e) { alert("無法連接到 5000 後端"); }
        }

        async function pauseSim() {
            try {
                const res = await fetch(`${API}/pause`, { method: 'POST' });
                const data = await res.json();
                document.getElementById('sim-status').innerText = data.paused ? "⏸ PAUSED" : "▶ SIM RUNNING";
                document.getElementById('sim-status').className = data.paused ? "text-xs font-bold px-2 py-1 text-[var(--warn)] border border-[var(--warn)]" : "text-xs font-bold px-2 py-1 text-[var(--good)] border border-[var(--good)] shadow-[0_0_10px_var(--good)]";
            } catch(e) {}
        }

        async function resetSim() {
            if(pollTimer) { clearInterval(pollTimer); pollTimer = null; }
            await fetch(`${API}/reset`, { method: 'POST' });
            document.getElementById('sim-status').innerText = "■ STANDBY";
            document.getElementById('sim-status').className = "text-xs font-bold px-2 py-1 text-gray-500 border border-gray-600";
            document.getElementById('ui-surv').innerText = "---";
            document.getElementById('ui-day').innerText = "0";
            document.getElementById('ui-hr').innerText = "00";
            simChart.data.labels = [];
            simChart.data.datasets.forEach(ds => ds.data = []);
            simChart.update();
        }

        function updateUI(data) {
            if(!data.running) return;
            
            // 更新數字
            document.getElementById('ui-surv').innerText = data.survivalPrediction.toFixed(1);
            document.getElementById('ui-day').innerText = data.missionDay;
            document.getElementById('ui-hr').innerText = String(data.missionTime % 24).padStart(2, '0');

            // 存活數字變色警告
            const svC = data.survivalPrediction > 30 ? 'var(--good)' : data.survivalPrediction > 10 ? 'var(--warn)' : 'var(--danger)';
            document.getElementById('ui-surv').style.color = svC;
            document.getElementById('ui-surv').style.textShadow = `0 0 20px ${svC}`;

            // 更新資源條
            const updateBar = (id, val) => {
                document.getElementById(`txt-${id}`).innerText = `${val.toFixed(1)}%`;
                document.getElementById(`bar-${id}`).style.width = `${Math.min(100, Math.max(0, val))}%`;
            };
            updateBar('o2', data.oxygen);
            updateBar('food', data.food);
            updateBar('water', data.water);
            updateBar('energy', data.energy);
            updateBar('health', data.health);

            // 更新圖表 (兼容讀取 Simulation 引擎的 recentHistory 數據)
            const chartData = data.recentHistory || data.history;
            if (chartData && chartData.length > 0) {
                const labels = chartData.map(h => `D${h.day}h${h.hour}`);
                simChart.data.labels = labels;
                simChart.data.datasets[0].data = chartData.map(h => h.oxygen);
                simChart.data.datasets[1].data = chartData.map(h => h.food);
                simChart.data.datasets[2].data = chartData.map(h => h.water);
                simChart.data.datasets[3].data = chartData.map(h => h.energy);
                simChart.update();
            }
        }

        async function pollData() {
            try {
                const res = await fetch(`${API}/status`);
                const data = await res.json();
                updateUI(data);
                if(!data.running && data.missionTime > 0) { // 模擬結束(失敗)
                    clearInterval(pollTimer);
                    pollTimer = null;
                    document.getElementById('sim-status').innerText = "💀 MISSION FAILED";
                    document.getElementById('sim-status').className = "text-xs font-bold px-2 py-1 text-[var(--danger)] border border-[var(--danger)] shadow-[0_0_15px_var(--danger)] animate-pulse";
                }
            } catch(e) {}
        }

        window.addEventListener('DOMContentLoaded', initChart);
// ================================================================
// 方案 C 核心：前端一键快照同步 (State Snapshot Injection)
// ================================================================
async function syncFromMaster() {
    const btn = document.getElementById('btn-sync-snapshot');
    const statusText = document.getElementById('sync-status-text');
    
    btn.disabled = true;
    statusText.style.color = '#ff0';
    statusText.innerText = '⏳ 正在連接前線主引擎 (Port 5000)...';

    try {
        // 1. 跨域抓取 5000 主引擎的实时战报
        const masterUrl = `${window.location.protocol}//${window.location.hostname}:5000/api/sim/status`;
        const masterResponse = await fetch(masterUrl);
        if (!masterResponse.ok) throw new Error('主引擎無響應，請確保 5000 端口已啟動');
        
        const masterData = await masterResponse.json();
        statusText.innerText = `✅ 抓取成功！當前 O₂: ${masterData.oxygen.toFixed(1)}% | 能源: ${masterData.energy.toFixed(1)}%`;

        // 2. 将战报“注入”到 5002 影子引擎
        // 2. 💡 修复：无需挑三拣四，直接将主引擎的 100% 完整物理快照无损注入影子引擎
        const injectResponse = await fetch('/api/dash/inject_snapshot', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(masterData)
        });

        if (injectResponse.ok) {
            statusText.style.color = '#0f0';
            statusText.innerText = '🚀 殘局同步完畢！影子引擎已接管，準備開始極限預測...';
            
            // 3. 自动触发 5002 的 UI 刷新，让图表立刻显示注入的初始点
            if (typeof updateDashboard === 'function') {
                updateDashboard(); // 如果您有定时刷新函数，可以调用它
            } else {
                // 如果没有，直接模拟点击一次“启动”按钮，让 5002 基于残局开始跑
                const startBtn = document.getElementById('btn-start') || document.querySelector('button[onclick*="start"]');
                if(startBtn) startBtn.click();
            }
        }

    } catch (error) {
        statusText.style.color = '#f00';
        statusText.innerText = `❌ 同步失敗: ${error.message}`;
    } finally {
        btn.disabled = false;
    }
}
    </script>
</body>
</html>
